<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vol2Vol Data</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --card-bg: #ffffff;
            --accent: #0066cc;
            --accent-hover: #0071e3;
            --success: #34c759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.003em;
            margin: 0 0 10px 0;
        }

        .header p {
            font-size: 20px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 400;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 28px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .preview-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 24px;
            background-color: #e5e5ea;
            border: 1px solid rgba(0,0,0,0.05);
            transition: opacity 0.3s ease;
        }

        .preview-img:hover {
            opacity: 0.9;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        button {
            background-color: #e8e8ed;
            color: var(--text-main);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        button:hover {
            background-color: #d1d1d6;
        }

        button:active {
            transform: scale(0.97);
        }

        button.primary {
            background-color: var(--accent);
            color: white;
        }

        button.primary:hover {
            background-color: var(--accent-hover);
        }

        button.success {
            background-color: var(--success) !important;
            color: white !important;
        }

        svg {
            width: 20px;
            height: 20px;
        }

        /* เพิ่ม CSS สำหรับ Loading Spinner */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        .opacity-25 { opacity: 0.25; }
        .opacity-75 { opacity: 0.75; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Vol2Vol Data</h1>
        <p>Daily updates for Gold, Oil, and ES</p>
    </div>

    <div class="container">
        
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Gold (GC)</h2>
            </div>
            <a href="https://raw.githubusercontent.com/pageth/Vol2VolData/images/Intraday+OI.png" target="_blank" title="View Full Image">
                <img src="https://raw.githubusercontent.com/pageth/Vol2VolData/images/Intraday+OI.png" alt="Gold Chart" class="preview-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100%\' height=\'100%\' fill=\'%23e5e5ea\'/><text x=\'50%\' y=\'50%\' fill=\'%2386868b\' font-family=\'sans-serif\' font-size=\'16\' text-anchor=\'middle\' dy=\'.3em\'>Image not ready</text></svg>'">
            </a>
            <div class="btn-group">
                <button onclick="copyData(this, 'IntradayData.txt')" class="primary">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Intraday Data
                </button>
                <button onclick="copyData(this, 'OIData.txt')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy OI Data
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Crude Oil (CL)</h2>
            </div>
            <a href="https://raw.githubusercontent.com/pageth/Vol2VolData/images/Oil-Intraday+OI.png" target="_blank" title="View Full Image">
                <img src="https://raw.githubusercontent.com/pageth/Vol2VolData/images/Oil-Intraday+OI.png" alt="Oil Chart" class="preview-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100%\' height=\'100%\' fill=\'%23e5e5ea\'/><text x=\'50%\' y=\'50%\' fill=\'%2386868b\' font-family=\'sans-serif\' font-size=\'16\' text-anchor=\'middle\' dy=\'.3em\'>Image not ready</text></svg>'">
            </a>
            <div class="btn-group">
                <button onclick="copyData(this, 'Oil-IntradayData.txt')" class="primary">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Intraday Data
                </button>
                <button onclick="copyData(this, 'Oil-OIData.txt')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy OI Data
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">S&P 500 (ES) </h2>
            </div>
            <a href="https://raw.githubusercontent.com/pageth/Vol2VolData/images/ES-Intraday+OI.png" target="_blank" title="View Full Image">
                <img src="https://raw.githubusercontent.com/pageth/Vol2VolData/images/ES-Intraday+OI.png" alt="ES Chart" class="preview-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'100%\' height=\'100%\' fill=\'%23e5e5ea\'/><text x=\'50%\' y=\'50%\' fill=\'%2386868b\' font-family=\'sans-serif\' font-size=\'16\' text-anchor=\'middle\' dy=\'.3em\'>Image not ready</text></svg>'">
            </a>
            <div class="btn-group">
                <button onclick="copyData(this, 'ES-IntradayData.txt')" class="primary">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Intraday Data
                </button>
                <button onclick="copyData(this, 'ES-OIData.txt')">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy OI Data
                </button>
            </div>
        </div>

    </div>

    <script>
        async function copyData(btnElement, fileName) {
            const originalHTML = btnElement.innerHTML;
            
            try {
                btnElement.innerHTML = `<svg class="animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Fetching...`;
                
                const response = await fetch(fileName + '?t=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error('File not found');
                }
                
                const text = await response.text();
                
                await navigator.clipboard.writeText(text);

                btnElement.classList.add('success');
                btnElement.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;

            } catch (err) {
                console.error('Failed to copy text: ', err);
                btnElement.innerHTML = `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> Error!`;
                alert(`Could not read ${fileName}. Note: This feature works best when hosted on GitHub Pages.`);
            }

            setTimeout(() => {
                btnElement.classList.remove('success');
                btnElement.innerHTML = originalHTML;
            }, 2000);
        }
    </script>
</body>
</html>
